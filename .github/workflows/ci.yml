name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      PORT: 3333
      HOST: 0.0.0.0
      ORIGEM_FRONTEND: http://localhost:5173
      DATABASE_URL: postgresql://lock_in:lock_in@localhost:5432/lock_in_pomodoro?schema=public
      DIRECT_URL: postgresql://lock_in:lock_in@localhost:5432/lock_in_pomodoro?schema=public
      JWT_SECRET: chave-de-teste-com-tamanho-seguro

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar lint
        run: npm run lint

      - name: Rodar build
        run: npm run build

      - name: Rodar testes
        run: npm test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      VITE_API_URL: http://localhost:3333

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Rodar build
        run: npm run build
